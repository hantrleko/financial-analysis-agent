target-version = "py311"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "E402",   # module-level import not at top (needed for sys.path manipulation)
    "B008",   # do not perform function calls in argument defaults
    "B905",   # zip-without-explicit-strict (Python 3.10+ strict param)
    "SIM108", # use ternary operator
    "UP007",  # use X | Y for union types (needs from __future__)
    "UP015",  # redundant-open-modes
    "UP017",  # datetime-timezone-utc
]

[lint.per-file-ignores]
"tests/*" = ["B", "SIM"]

[format]
quote-style = "double"
indent-style = "space"
